name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest black ruff

      - name: Check formatting with black
        run: black --check .

      - name: Lint with ruff
        run: ruff check .

      - name: Run lightweight import test
        run: |
          python -c "import src.features"
          python -c "import src.train"
          python -c "import src.evaluate"

      - name: Run tests
        run: pytest tests/
